[project]
site_name = "BAM Masterdata"
site_description = "Documentation page for the BAM Masterdata."
site_author = "BAM Data Store"

copyright = """
Copyright &copy; 2026 BAM Data Store
"""

nav = [
  { Home = "index.md" },
  { Tutorials = [
      "tutorials/getting_started.md",
      "tutorials/parsing.md",
  ]},
  { "How-to Guides" = [
      "howtos/object_types.md",
      "howtos/object_references.md",
      "howtos/extend_masterdata.md",
      { Parsing = [
          "howtos/parsing/parser_app.md",
          "howtos/parsing/create_new_parsers.md",
      ]},
  ]},
  { Explanations = [
      "explanations/parsing_structure.md",
      "explanations/schema_defs.md",
      "explanations/metadata_definitions.md",
      "explanations/metadata_entities.md",
  ]},
  { References = [
      "references/glossary.md",
      "references/api.md" ,
  ]},
]

extra_css = [
  "stylesheets/extra.css",
]

extra_javascript = [
  "https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js",
  "https://unpkg.com/cytoscape@3.19.1/dist/cytoscape.min.js",
  "https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js",
]

[project.theme]

logo = "assets/bammasterdata_blue_transparent.png"
favicon = "assets/bammasterdata_blue_transparent.png"

language = "en"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
primary = "custom"
accent = "custom"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.admonition]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 3

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.fenced_code]

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"
